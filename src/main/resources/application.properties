spring.application.name=salessavvy

# Render provides PORT automatically
server.port=${PORT:9090}

# Database Configuration (Use Environment Variables)

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

#spring.datasource.url=jdbc:mysql://localhost:3306/sales_savvy spring.datasource.username=root spring.datasource.password=root
#spring.datasource.url=jdbc:mysql://localhost:3306/sales_savvy
#spring.datasource.username=root
#spring.datasource.password=root
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable Spring Security

spring.security.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# JWT Configuration

jwt.secret=${JWT_SECRET:your-very-long-secure-secret-key-for-production-12345678901234567890}
jwt.expiration=3600000

# CORS Configuration (Allow deployed frontend)

spring.web.cors.allowed-origin-patterns=*
spring.web.cors.exposed-headers=*
spring.web.cors.max-age=36000
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Content-Type,Authorization
spring.web.cors.allow-credentials=true

# Logging

logging.level.root=INFO
logging.level.org.springframework.web=INFO

